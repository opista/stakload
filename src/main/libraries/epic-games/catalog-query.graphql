query catalogQuery($namespace: String!, $locale: String, $count: Int, $start: Int, $country: String!) {
  Catalog {
    catalogOffers(
      namespace: $namespace
      locale: $locale
      params: { count: $count, start: $start, country: $country }
      countryAgeFilter: { shouldCheck: false }
    ) {
      elements {
        id
      }
      paging {
        count
        start
        total
      }
    }
  }
}
