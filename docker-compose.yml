services:
  postgres:
    image: postgres:17
    container_name: stakload-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stakload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stakload}
      POSTGRES_USER: ${POSTGRES_USER:-stakload}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stakload} -d ${POSTGRES_DB:-stakload}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stakload-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-stakload}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-stakload}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-webhook:
    image: stakload/api-webhook
    build:
      context: .
      dockerfile: apps/api-webhook/Dockerfile
    container_name: stakload-api-webhook
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-stakload}:${POSTGRES_PASSWORD:-stakload}@postgres:5432/${POSTGRES_DB:-stakload}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
      IGDB_SCHEDULED_SYNC_ENABLED: ${IGDB_SCHEDULED_SYNC_ENABLED:-false}
      IGDB_WEBHOOK_SECRET: ${IGDB_WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL:-http://localhost:3001}
    ports:
      - "${API_WEBHOOK_PORT:-3001}:3001"

  worker-builder:
    image: stakload/worker-builder
    build:
      context: .
      dockerfile: apps/worker-builder/Dockerfile
    container_name: stakload-worker-builder
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-stakload}
      WORKER_BUILDER_CONCURRENCY: ${WORKER_BUILDER_CONCURRENCY:-4}

volumes:
  postgres-data:
  redis-data:
