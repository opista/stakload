services:
  postgres:
    image: postgres:17
    container_name: stakload-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stakload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stakload}
      POSTGRES_USER: ${POSTGRES_USER:-stakload}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stakload} -d ${POSTGRES_DB:-stakload}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api-webhook:
    build:
      context: .
      dockerfile: apps/api-webhook/Dockerfile
    container_name: stakload-api-webhook
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:-true}
      DATABASE_URL: postgresql://${POSTGRES_USER:-stakload}:${POSTGRES_PASSWORD:-stakload}@postgres:5432/${POSTGRES_DB:-stakload}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
      IGDB_WEBHOOK_SECRET: ${IGDB_WEBHOOK_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL:-http://localhost:3001}
    ports:
      - "${API_WEBHOOK_PORT:-3001}:3001"

volumes:
  postgres-data:
